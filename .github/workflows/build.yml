name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mc: ['26.1', '26.2']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - name: Build & test (MC ${{ matrix.mc }})
        run: ./gradlew build -Pmc=${{ matrix.mc }}
      # Un seul jar universel publié (build 26.2) ; le job 26.1 ne sert que de vérif de compilation.
      # archive: false → le jar se télécharge directement, sans zip.
      - uses: actions/upload-artifact@v7.0.1
        if: matrix.mc == '26.2'
        with:
          name: HypixelSimpleChat
          path: build/libs/*.jar
          if-no-files-found: error
          archive: false

  # Tag v* → release GitHub avec le jar en téléchargement direct (pas de zip, contrairement aux artifacts).
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build -Pmc=26.2 -x test
      - uses: softprops/action-gh-release@v2
        with:
          files: build/libs/HypixelSimpleChat-*.jar
          generate_release_notes: true
