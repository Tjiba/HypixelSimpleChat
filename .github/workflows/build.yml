name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mc: ['26.1', '26.2']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - name: Build & test (MC ${{ matrix.mc }})
        run: ./gradlew build -Pmc=${{ matrix.mc }}
      # Un seul jar universel publié (build 26.2) ; le job 26.1 ne sert que de vérif de compilation.
      - uses: actions/upload-artifact@v4
        if: matrix.mc == '26.2'
        with:
          name: HypixelSimpleChat
          path: build/libs/*.jar
